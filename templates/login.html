{% extends "base.html" %}
{% block content %}
<div class="card narrow">
<h2>로그인</h2>
<form method="post">

  <label>아이디 <input name="username" required maxlength="20"></label>
  <label>비밀번호 <input type="password" name="password" required></label>
  <button class="btn" type="submit">로그인</button>
</form>
</div>
{% endblock %}
