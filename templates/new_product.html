{% extends "base.html" %}
{% block content %}
<div class="card narrow">
<h2>상품 등록</h2>
<form method="post" enctype="multipart/form-data">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <label>상품명 <input name="title" required maxlength="100"></label>
  <label>설명 <textarea name="description" required maxlength="2000" rows="5"></textarea></label>
  <label>가격 <input name="price" required type="number" min="0" max="999999999"></label>
  <label>이미지 <input type="file" name="image" accept=".png,.jpg,.jpeg,.gif,.webp"></label>
  <button class="btn" type="submit">등록</button>
</form>
</div>
{% endblock %}
