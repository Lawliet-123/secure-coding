{% extends "base.html" %}
{% block content %}
<div class="card narrow">
<h2>상품 수정</h2>
<form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <label>상품명 <input name="title" required maxlength="100" value="{{ product.title }}"></label>
  <label>설명 <textarea name="description" required maxlength="2000" rows="5">{{ product.description }}</textarea></label>
  <label>가격 <input name="price" required type="number" min="0" value="{{ product.price }}"></label>
  <button class="btn" type="submit">수정</button>
</form>
</div>
{% endblock %}
